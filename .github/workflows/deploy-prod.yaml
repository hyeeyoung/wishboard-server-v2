name: main-monorepo-deploy

on:
  push:
    branches: [ main ]
  # 직접 트리거
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to main'
        required: true
        default: 'main'
      module:
        description: 'Module to deploy (all = api + parsing-api + push)'
        required: true
        default: 'api'
        type: choice
        options:
          - all
          - api
          - parsing-api
          - push

env:
  AWS_REGION: ap-northeast-2
  AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME_PROD }}
  BUILD_DIR_NAME: wishboard-v2-build-prod
  PHASE: prod

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api         || steps.fallback.outputs.api }}
      parsing_api: ${{ steps.filter.outputs.parsing_api || steps.fallback.outputs.parsing_api }}
      push: ${{ steps.filter.outputs.push        || steps.fallback.outputs.push }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:          [ 'api/**' ]
            parsing_api:  [ 'parsing-api/**' ]
            push:         [ 'push/**' ]

      - id: fallback
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "api=${{ github.event.inputs.module == 'api' || github.event.inputs.module == 'all' }}" >> "$GITHUB_OUTPUT"
          echo "parsing_api=${{ github.event.inputs.module == 'parsing-api' || github.event.inputs.module == 'all' }}" >> "$GITHUB_OUTPUT"
          echo "push=${{ github.event.inputs.module == 'push' || github.event.inputs.module == 'all' }}" >> "$GITHUB_OUTPUT"

      - name: Print changed outputs
        run: |
          echo "api changed: ${{ steps.filter.outputs.api || steps.fallback.outputs.api }}"
          echo "parsing-api changed: ${{ steps.filter.outputs.parsing_api || steps.fallback.outputs.parsing_api }}"
          echo "push changed: ${{ steps.filter.outputs.push || steps.fallback.outputs.push }}"

  # ---------------------------------------------------------------------------
  # Spring API (Gradle / JDK 21)
  # ---------------------------------------------------------------------------
  build-api:
    needs: [ changes ]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'api' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create Spring secret files
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_PROD_YML }}" > src/main/resources/application-prod.yml

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (skip tests)
        run: ./gradlew build -x test

      - name: Package artefacts
        run: |
          mkdir -p ../artifact/api
          cp build/libs/* ../artifact/api/
          cp ../v2-pm2-run-${{ env.PHASE }}.js ../artifact/
          cp ../deploy.sh ../artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp --recursive ../artifact s3://$AWS_S3_BUCKET_NAME/$BUILD_DIR_NAME

  # ---------------------------------------------------------------------------
  # parsing-api (Node 22.x LTS, .nvmrc single source of truth)
  # ---------------------------------------------------------------------------
  build-parsing-api:
    needs: [ changes ]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.parsing_api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'parsing-api' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parsing-api
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'parsing-api/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'parsing-api/package-lock.json'

      - name: Verify npm version
        run: npm -v

      - name: npm ci (clean install, dev 포함)
        run: npm ci

      - name: Create .env
        run: |
          touch .env
          echo NODE_ENV="production" >> .env
          echo "${{ secrets.PARSING_API_ENV }}" > .env

      - name: Build (prod)
        run: npm run build:production --if-present

      - name: Prune dev dependencies (playwright 만 잔존)
        run: npm prune --omit=dev

      - name: Package artefacts
        run: |
          mkdir -p ../artifact/parsing-api
          # webpack 빌드 산출물
          cp -r dist/. ../artifact/parsing-api/
          # webpack externals 로 분리된 playwright 런타임을 함께 배포
          cp -r node_modules ../artifact/parsing-api/
          cp package.json package-lock.json ../artifact/parsing-api/
          # 공통 파일
          cp ../v2-pm2-run-${{ env.PHASE }}.js ../artifact/
          cp ../deploy.sh ../artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artefacts to S3
        run: |
          aws s3 cp --recursive ../artifact s3://$AWS_S3_BUCKET_NAME/$BUILD_DIR_NAME

  # ---------------------------------------------------------------------------
  # push (Node 22.x LTS)
  # ---------------------------------------------------------------------------
  build-push:
    needs: [ changes ]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.push == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'push' || github.event.inputs.module == 'all'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: push
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'push/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'push/package-lock.json'

      - name: Verify npm version
        run: npm -v

      - name: npm ci (clean install)
        run: npm ci

      - name: Create .env
        run: |
          touch .env
          echo NODE_ENV="production" >> .env
          echo "${{ secrets.PUSH_ENV }}" > .env

          echo "== '\n' 인식 문제로 인해 재할당 =="
          echo FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }} >> .env

      - name: Build (prod)
        run: npm run build:production --if-present

      - name: Package artefacts
        run: |
          mkdir -p ../artifact/push
          # webpack 번들에 모든 의존성 inline (native 의존 없음 → node_modules 불필요)
          cp -r dist/. ../artifact/push/
          # 공통 파일
          cp ../v2-pm2-run-${{ env.PHASE }}.js ../artifact/
          cp ../deploy.sh ../artifact/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artefacts to S3
        run: |
          aws s3 cp --recursive ../artifact s3://$AWS_S3_BUCKET_NAME/$BUILD_DIR_NAME
